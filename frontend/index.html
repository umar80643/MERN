<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Academy</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f2f2f2;
        }


        nav {
            background: #222;
            color: white;
            padding: 15px;
        }

        nav h2 {
            display: inline;
            margin-left: 20px;
        }

        nav ul {
            float: right;
            margin-right: 10px;
            margin-top: -10px;

        }

        nav ul li {
            display: inline;
            margin-left: 20px;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
        }

    

        .hero {
            background: #0d6efd;
            color: white;
            text-align: center;
            padding: 80px;
        }

        .hero button {
            background: orange;
            border: none;
            padding: 10px 20px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
        }

    

        .container {
            margin: 40px;
            text-align: center;
        }

        .card {
            width: 300px;
            display: inline-block;
            background: white;
            margin: 15px;
            border-radius: 8px;
            box-shadow: 0 0 10px gray;
            overflow: hidden;
        }

        .card img {
            width: 100%;
            height: 200px;
        }

        .card h2 {
            margin: 10px;
        }

        .card p {
            margin: 10px;
        }

        .card button {
            background: #0d6efd;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 15px;
            border-radius: 5px;
            cursor: pointer;
        }


        .badge {
            background: green;
            color: white;
            padding: 3px 8px;
            border-radius: 5px;
            font-size: 14px;
        }
    </style>

    </style>
</head>

<body>

    <nav>
        <div class="logo">Tech Academy</div>

        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <!-- Hero -->
    <section class="hero">

        <h1>Welcome to Tech Academy</h1>

        <p>Learn HTML, CSS and Bootstrap</p>

        <button>Explore</button>

    </section>

    <section class="cards">

        <div class="card">

            <img src="../images/html.jpg" alt="HTML" height="100px">

            <h2>HTML <span>New</span></h2>

            <p>Learn HTML basics.</p>

            <button>Read More</button>

        </div>

        <div class="card">

            <img src="../images/css.jpg" alt="CSS" height="100px">

            <h2>CSS</h2>

            <p>Design beautiful webpages.</p>

            <button>Read More</button>

        </div>

        <div class="card">

            <img src="images/bootstrap.jpg" alt="Bootstrap" height="100px">

            <h2>Bootstrap</h2>

            <p>Create responsive websites.</p>

            <button>Read More</button>

        </div>

    </section>

</body>

</html>
