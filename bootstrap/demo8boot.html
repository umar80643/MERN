<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
        integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">

</head>
<style>
    .carousel-item>img {
        width: 100%;
        height: 300px;
    }
</style>

<body>
    <div class="container pt-5">
        <div class="carousel slide carousel-fade" data-ride="carousel" data-interval="2000" data-pause="off"
            id="mycarousel">

            <div class="carousel-inner">
                <!-- first image -->
                <div class="carousel-item active">
                    <img src="../images/x.jpg" width="400px" />
                    <p class="carousel-caption bg-primary">hello world </p>
                </div>
                <!-- second -->
                <div class="carousel-item">
                    <img src="../images/x2.jpg" width="400px" />
                </div>
                <!-- thirds -->
                <div class="carousel-item">
                    <img src="../images/x3.jpg" width="400px" />
                </div>



            </div>
            <!-- previous buttons -->
            <a href="#mycarousel" class="carousel-control-prev" data-slide="prev">
                <span class="carousel-control-prev-icon"></span>


            </a>
            <a href="#mycarousel" class="carousel-control-next" data-slide="prev">
                <span class="carousel-control-next-icon"></span>


            </a>

            <!-- indicators -->
            <ul class="carousel-indicators">
                <li class="active" class="#mycarousel" data-slide-to="0"></li>
                <li data-target="#mycarousel" data-slide-to="1"></li>
                <li data-target="#mycarousel" data-slide-to="2"></li>

            </ul>
        </div>

    </div>


    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"
        integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct"
        crossorigin="anonymous"></script>
</body>

</html>
