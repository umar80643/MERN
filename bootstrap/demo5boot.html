<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"

</head>

<body>
    <div class="container mt-3">
        <button>button</button>

        <button class="btn btn-primary">button</button>
        <button class="btn btn-link">button</button>
        <button class="btn btn-danger">button</button>
        <button class=" btn btn-danger btn-sm">button</button>
        <button class="btn btn-danger btn-lg">button</button>
        <button class="btn btn-info btn-block">button</button>
        <button class=" btn btn-outline-danger">button</button>
        <button class="btn btn-outline-dark">button</button>
        <button class="">button</button>
        <button class="">button</button>
        <button class="">button</button>


    </div>



    <div class="container mt-3">
        <span class="spinner-border text-danger"></span>
        <span class="spinner-border spinner-border-sm text-danger"></span>

        <span class="spinner-grow"></span>
        <span class="spinner-grow text-info"></span>
        <span class="spinner-grow text-info spinner-border-sm"></span>


    </div>

    <div class="container mt-3">
        <div class="progress">
            <div class="progress-bar bg-dark" style="width: 70%;">

                Loading...70%
            </div>
        </div>
    </div>

    <div class="container mt-3">
        <div class="progress">
            <div class="progress-bar progress-bar-striped" style="width: 70%;">

                Loading...70%
            </div>
        </div>
    </div>

    <div class="container mt-3">
        <div class="progress">
            <div class="progress-bar progress-bar-striped progress-bar-animated" style="width: 70%;">

                Loading...70%
            </div>
        </div>
    </div>
