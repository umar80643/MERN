<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <form method="post" novalidate autocomplete="off"">
        <table border=" 5px" width="500px" align="center" bgcolor="#bababa">
        <tbody align="center">
            <tr>
                <td> ENTER USER NAME</td>
                <td>
                    <input type="text" name="usn" min="2" maxlength="15" value="umar" readonly required />
                </td>
            </tr>
            <tr>
                <td>PASSWORD</td>
                <td>
                    <input type="password" name="pwd" placeholder="Hp@123" disabled />
                </td>
            </tr>
            <tr>
                <td>DOB (date of birth)</td>
                <td>
                    <input name="DOB" type="date" mine="2026-05-25" max="2020-07-17" disabled required />
                </td>
            </tr>
            <tr>
                <td>Email</td>
                <td>
                    <input type="email" name="mail" disabled />
                </td>
            </tr>
            <tr>
                <td>Mobile No</td>
                <td>
                    <input type="tel" / maxlength="10" name="phone number" disabled />
                </td>
            </tr>
            <tr>
                <td>Gender</td>
                <td>
                    <input type="radio" name="gen" id="m" />
                    <label for="m">Males</label>


                    <input type="radio" name="gen" id="F" />
                    <label for="m">Female</label>


                    <input type="radio" name="gen" id="" />
                    <label for="m">Others</label>


                </td>
            </tr>
            <tr>
                <td>Qualification</td>
                <td>
                    <select>

                        <option disabled selected>--select--</option>

                        <option>Btech</option>
                        <option>Mtech</option>
                        <option>Bba</option>
                        <option>Bcom</option>
                        <option>Bca</option>
                        <option disabled>Mca</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td> UNIVERSITY </td>
                <td> <input type="text" list="mylist" /> </td>
                <td>
                    <datalist id="mylist">
                        <option>AKTU</option>
                        <option>LPU</option>
                        <option>IIT</option>
                        <option>DU</option>
                        <option>CSJMU</option>
                        <option>AMU</option>
                        <option>JMI</option>
                        <option>HBTU</option>
                    </datalist>
                </td>

            </tr>
            <tr>
                <td>Hobbies</td>
                <td>


                    <input type="checkbox" id="chk1" />
                    <label for="chk1">reading</label>

                    <input type="checkbox" id="chk2" />
                    <label for="chk2">playing</label>
                </td>
            </tr>

            <tr>
                <td>upload profile pic</td>
                <td>


                    <input type="file" accept=".jpg,.png,jpeg,.pdf" />

                </td>
            </tr>
            <tr>
                <td>Hidden value</td>
                <td>


                    <input type="hidden" value="Emp10021" />

                </td>
            </tr>

            <tr>
                <td>CGPA</td>
                <td>

                    <input name="CGPA" type="number" min="1" max="10" step="0.01" />


                </td>
            </tr>
            <tr>
                <td>Range</td>
                <td>

                    <input name="Range" type="range" min="99" max="999" value="299" />


                </td>
            </tr>
            <tr>
                <td></td>
                <td colspan="2">

                    <input type="submit" value="Resgister" />
                    <input type="reset" value="Reset " />



                </td>
            </tr>
        </tbody>
        </table>

</body>

</html>
