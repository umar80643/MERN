<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Table Example</title>
</head>

<body>

    <h1 align="center">Student Information</h1>

    <table border="10" cellpadding="10" cellspacing="0" width="70%" align="center" bgcolor="lightblue">

        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Age</th>
            <th>Course</th>
            <th>City</th>
        </tr>

        <tr>
            <td>1</td>
            <td>Umar</td>
            <td>21</td>
            <td>B.Tech CSE (AI & ML)</td>
            <td rowspan="3">Kanpur</td>
        </tr>

        <tr>
            <td>2</td>
            <td>Ali</td>
            <td>22</td>
            <td>BCA</td>

        </tr>

        <tr>
            <td>3</td>
            <td>Ahmed</td>
            <td>20</td>
            <td>B.Sc</td>

        </tr>

    </table>

</body>

</html>
