<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .container {
    
        border: 1px solid red;
        height: 600px;
        text-align: center;
        display: flex;
        flex-wrap: wrap;
       /* flex-direction:column;
        align-items: center;
        justify-content: stretch;*/
        align-content:center;
        justify-content: center;
      
       

    
    }
    .container>div{
        width: 100px;
        height: 100px;
        border: 1px solid blue;
        font-size: x-large;
    }
    .container>div:nth-child(odd)
    {
        background-color: aliceblue;
    }
    .container>div:nth-child(even)
    {
        background-color: yellow;
    }
    #d1 {
        order: 1;
        flex-grow:1 ;
        flex-shrink: 1;
        flex-basis: 200px;
    }
    #d2 {
        order: 3;
        flex-grow:1 ;
        flex-shrink: 1;
             flex-basis: 100px;
    }
    #d3 {
        order: 2;
        flex-grow:1 ;
        flex-shrink: 1;
             flex-basis: 20px;
    }
    #d4 {
        order: 5;
        flex-grow:1 ;
        flex-shrink: 1;
             flex-basis: 210px;
    }
    #d4 {
        order: 2;
        flex-grow:1 ;
        flex-shrink: 1;
        flex-basis: 10px;
    }
    
</style>
<body>
        <div class="container">
            <div id="d1">mydiv 1</div>
            <div id="d2">mydiv 2</div>
            <div id="d3">mydiv 3</div>
            <div id="d4">mydiv 4</div>
            <div id="d5">mydiv 5</div>
          
    
        </div>

</body>
</html>
