<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style type="text/css">
        .container {
            width: 100%;
            height: 510px;
            border: 1px solid black;
            position: relative;
        }

        #d1,
        #d2,
        #d3,
        #d4,
        #d5 {
            width: 100px;
            height: 100px;
            border: 1px solid black;
            text-align: center;
        }

        #d1 {
            background: lightgray;
        }

        #d2 {
            position: relative;
            background: lightblue;

        }

        #d3 {

            background: lightgreen;

        }

        #d4 {
            background: lightpink;

        }

        #d5 {
            background: navy;
        }

        h1 {
            background-color: bisque;
            color: black;
            text-align: center;
            line-height: 80px;

        }
    </style>
</head>

<body>

    <h1>position demo page</h1>
    <div class="container" />
    <div id="d1">My div 1</div>
    <div id="d2">My div 2</div>
    <div id="d3">My div 3</div>
    <div id="d4">My div 4</div>
    <div id="d5">My div 5</div>
    </div>






</body>

</html>
